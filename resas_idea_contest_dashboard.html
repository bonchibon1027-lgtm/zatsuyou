<script>
const data = JSON.parse(document.getElementById('data').textContent);
let records = data.records;
let activeChip = '';
const $ = (id) => document.getElementById(id);
function uniq(arr) { return [...new Set(arr.filter(Boolean))].sort(); }
function fillSelect(id, values) { for (const v of values) { const o=document.createElement('option'); o.value=v; o.textContent=v; $(id).appendChild(o); } }
fillSelect('year', uniq(records.map(r => String(r.year))).reverse());
fillSelect('cat', uniq(records.flatMap(r => r.problem_categories)));
fillSelect('idea', uniq(records.flatMap(r => r.idea_types)));
const topCats = Object.entries(data.stats.by_category).sort((a,b)=>b[1]-a[1]).slice(0,10);
$('chips').innerHTML = topCats.map(([k,v]) => `<button class="chip" data-cat="${k}">${k} (${v})</button>`).join('');
$('chips').addEventListener('click', e => { if(!e.target.dataset.cat) return; activeChip = activeChip === e.target.dataset.cat ? '' : e.target.dataset.cat; $('cat').value = activeChip; render(); });
['q','year','cat','idea','sort'].forEach(id => $(id).addEventListener('input', () => { if(id==='cat') activeChip=$('cat').value; render(); }));
function match(r) {
  const q = $('q').value.trim().toLowerCase();
  const blob = [r.title,r.region,r.team,r.members,r.problem_summary,r.text_excerpt,(r.problem_categories||[]).join(' '),(r.idea_types||[]).join(' ')].join(' ').toLowerCase();
  return (!q || blob.includes(q)) &&
    (!$('year').value || String(r.year)===$('year').value) &&
    (!$('cat').value || (r.problem_categories||[]).includes($('cat').value)) &&
    (!$('idea').value || (r.idea_types||[]).includes($('idea').value));
}
function render() {
  document.querySelectorAll('.chip').forEach(c => c.classList.toggle('active', c.dataset.cat === activeChip));
  let rows = records.filter(match);
  const sort = $('sort').value;
  rows.sort((a,b) => sort === 'year_asc' ? a.year-b.year || a.title.localeCompare(b.title,'ja') :
    sort === 'region' ? a.region.localeCompare(b.region,'ja') :
    sort === 'title' ? a.title.localeCompare(b.title,'ja') :
    b.year-a.year || a.title.localeCompare(b.title,'ja'));
  const regions = uniq(rows.map(r=>r.region)).length;
  const cats = uniq(rows.flatMap(r=>r.problem_categories)).length;
  $('summary').innerHTML = [
    ['表示作品', rows.length], ['地域数', regions], ['分析テーマ数', cats], ['対象年', uniq(rows.map(r=>r.year)).join(', ') || '-']
  ].map(([k,v]) => `<div class="metric"><b>${v}</b><span>${k}</span></div>`).join('');
  $('cards').innerHTML = rows.length ? rows.map(r => `
    <article class="card">
      <div class="meta"><span class="tag year">${r.year}</span>${(r.awards||[]).map(a=>`<span class="tag award">${a}</span>`).join('')}<span class="tag">${r.category}</span></div>
      <div class="title">${r.title}</div>
      <div class="region">${r.region}</div>
      <div class="small">${r.problem_summary}</div>
      <div class="meta">${(r.problem_categories||[]).map(c=>`<span class="tag">${c}</span>`).join('')}</div>
      <div class="meta">${(r.idea_types||[]).map(c=>`<span class="tag">${c}</span>`).join('')}</div>
      <div class="small"><b>所属/チーム:</b> ${r.team || '-'}</div>
      <details><summary>PDF抽出テキストの冒頭</summary><p class="small">${r.text_excerpt || 'テキスト抽出不可または画像主体のPDFです。'}</p></details>
      <div class="actions"><a href="${r.pdf_url}" target="_blank">公式PDF</a><a href="${r.source_url}" target="_blank">公式ページ</a></div>
    </article>`).join('') : '<div class="empty">該当する作品がありません。</div>';
}
render();
</script>
